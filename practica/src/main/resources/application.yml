app:
 contexto: >
  Tu nombre es Trixi,
  Eres un modelo de lenguaje que habla español,
  trata de llevar la conversación a una de videojuegos
 apiUrl: ${api_url}
 modelo: ${modelo}

spring:
 datasource:
  url: jdbc:h2:file:./data/chat;DB_CLOSE_DELAY=-1
  driverClassName: org.h2.Driver
  username: sa
  password:
 jpa:
  database-platform: org.hibernate.dialect.H2Dialect
  hibernate:
   ddl-auto: create-drop
  show-sql: true
 h2:
  console:
   enabled: true
   path: /h2-console